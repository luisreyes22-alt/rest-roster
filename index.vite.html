<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#FFF8ED" id="theme-color-meta"/>
<title>DrowsyCraft</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css"/>
<style>
/* DrowsyCraft design system — see docs/DESIGN_SYSTEM.md for the full rationale.
   "Daytime Camp" (light) / "Nighttime Sleep" (dark): warm, soft, rounded - not
   the cool "garden green" palette this app started with. */
:root {
  --bg: #FFF8ED;
  --surface: #FFFFFF;
  --surface-alt: #FFECD1;
  --border: #F4DDBB;
  --border-strong: #E8C48C;
  --text-primary: #4A3728;
  --text-secondary: #8A6F56;
  --text-muted: #C7B199;
  --accent: #FF9F40;
  --accent-strong: #E07E1F;
  --accent-soft: #FFE1B0;
  --on-accent: #FFFFFF;
  --success: #6FBE8F;
  --success-bg: #E3F5EA;
  --info: #7FADD9;
  --info-bg: #E7F1FA;
  --danger: #F0785C;
  --danger-bg: #FDEAE4;
  --tier-s: #F2C14E; --tier-s-bg: #FCF1D6;
  --tier-a: #7FBE7A; --tier-a-bg: #E7F4E4;
  --tier-b: #7FADD9; --tier-b-bg: #E7F1FA;
  --tier-c: #B4A88F; --tier-c-bg: #F1EAE0;
  --tier-d: #D8CBB5; --tier-d-bg: #F6F1E8;
  --specialty-berries: #E8628A;
  --specialty-ingredients: #6FBE73;
  --specialty-skills: #6A9EE0;
  --specialty-all: #F2C14E;
  --radius-sm: 10px;
  --radius-card: 22px;
  --radius-control: 16px;
  --radius-pill: 999px;
  --shadow-card: 0 2px 10px rgba(74, 55, 40, 0.06);
  --shadow-card-hover: 0 6px 20px rgba(255, 159, 64, 0.18);
}
[data-theme="dark"] {
  --bg: #1B1730;
  --surface: #262042;
  --surface-alt: #322A56;
  --border: #40376B;
  --border-strong: #544A87;
  --text-primary: #F3EEFF;
  --text-secondary: #C6B9F0;
  --text-muted: #8477B0;
  --accent: #FFB86B;
  --accent-strong: #FFA548;
  --accent-soft: #3D3364;
  --on-accent: #241905;
  --success: #7FD1A0;
  --success-bg: #1E3A34;
  --info: #8FC0EE;
  --info-bg: #1C3550;
  --danger: #F0947E;
  --danger-bg: #3E2A24;
  --tier-s: #F5D26E; --tier-s-bg: #453619;
  --tier-a: #8FD18A; --tier-a-bg: #253A29;
  --tier-b: #8FC0EE; --tier-b-bg: #1C3550;
  --tier-c: #A79BC7; --tier-c-bg: #2E2A47;
  --tier-d: #6E6396; --tier-d-bg: #262142;
  --specialty-berries: #F08AA8;
  --specialty-ingredients: #8FD18A;
  --specialty-skills: #8FC0EE;
  --specialty-all: #F5D26E;
  --shadow-card: 0 2px 10px rgba(0, 0, 0, 0.25);
  --shadow-card-hover: 0 6px 20px rgba(0, 0, 0, 0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-primary); font-family: 'Nunito', -apple-system, sans-serif; }
.display { font-family: 'Baloo 2', 'Nunito', sans-serif; }
.mono-stat { font-family: 'JetBrains Mono', monospace; }
input, select, textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-control); color: var(--text-primary); padding: 11px 12px; font-size: 14px; outline: none;
  font-family: 'Nunito', sans-serif;
}
input::placeholder { color: var(--text-muted); }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select { appearance: none; -webkit-appearance: none; }
label { display: block; font-size: 10px; color: var(--text-secondary); font-family: 'Nunito', sans-serif; font-weight: 700;
  letter-spacing: 0.06em; margin-bottom: 5px; text-transform: uppercase; }
button { cursor: pointer; font-family: 'Nunito', sans-serif; }
.field { margin-bottom: 14px; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
  background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-control);
  max-height: 200px; overflow-y: auto; margin-top: 4px; box-shadow: 0 4px 16px rgba(43,36,23,0.12); }
.autocomplete-item { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
.autocomplete-item:active { background: var(--surface-alt); }

/* ── Responsive app shell ──────────────────────────────────────────────────
   Mobile-first by default (single column, bottom tab bar, 480px content cap).
   At >=900px ("desktop"), the nav becomes a fixed left sidebar and the content
   area is freed to fill the viewport so multi-column card grids have room. */
.app-content { max-width: 480px; margin: 0 auto; padding: 20px 16px 24px; }
/* Mobile: hidden-by-default drawer, slides up from the bottom behind a hamburger
   toggle in the header instead of a permanently-docked tab bar. Desktop keeps the
   always-visible left sidebar built for the Bulk Edit workflow - untouched below. */
.app-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 1px solid var(--border); display: flex; z-index: 20;
  border-radius: 20px 20px 0 0; box-shadow: var(--shadow-card-hover);
  transform: translateY(100%); transition: transform 0.25s ease; }
.app-nav.app-nav-open { transform: translateY(0); }
.app-nav button { flex: 1; padding: 14px 8px; border-top: 2px solid transparent; }
.app-nav button[data-active="true"] { border-top: 2px solid var(--accent); }
.app-nav-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 15; }
.hamburger-btn { display: flex; }

.card-grid { display: grid; grid-template-columns: 1fr; gap: 12px; align-items: start; }
.dex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-items: start; }

@media (min-width: 900px) {
  body { --sidebar-width: 208px; }
  .app-content { max-width: none; padding: 28px 32px 32px calc(var(--sidebar-width) + 32px); }
  .app-nav { top: 0; bottom: 0; right: auto; width: var(--sidebar-width);
    border-top: none; border-right: 1px solid var(--border); flex-direction: column;
    padding-top: 76px; border-radius: 0; box-shadow: none; transform: none !important; }
  .app-nav button { flex: none; flex-direction: row !important; justify-content: flex-start;
    gap: 10px !important; padding: 12px 20px; border-top: none !important;
    border-left: 3px solid transparent; }
  .app-nav button[data-active="true"] { border-left: 3px solid var(--accent); background: var(--accent-soft); }
  .app-nav button span { font-size: 12px !important; }
  .app-nav-backdrop, .hamburger-btn { display: none !important; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
  .dex-grid { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px; }
}

@media (min-width: 1400px) {
  .app-content { padding-right: 48px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="./formulas.js"></script>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>

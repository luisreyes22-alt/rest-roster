<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0D1B2A"/>
<title>Sleep Optimizer</title>
<link rel="manifest" href="./manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0D1B2A; color: #E8E4F0; font-family: Inter, -apple-system, sans-serif; }
input, select, textarea {
  width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(75,45,143,0.4);
  border-radius: 10px; color: #E8E4F0; padding: 11px 12px; font-size: 14px; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: rgba(123,77,191,0.9); }
select { appearance: none; -webkit-appearance: none; }
label { display: block; font-size: 10px; color: #555577; font-family: monospace;
  letter-spacing: 0.08em; margin-bottom: 5px; text-transform: uppercase; }
button { cursor: pointer; font-family: inherit; }
.field { margin-bottom: 14px; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
  background: #16233a; border: 1px solid rgba(75,45,143,0.6); border-radius: 10px;
  max-height: 200px; overflow-y: auto; margin-top: 4px; }
.autocomplete-item { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.autocomplete-item:active { background: rgba(75,45,143,0.4); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Tier config ───────────────────────────────────────────────────────────────
const TIER_COLORS = { S:"#F0C040", A:"#2ECC8A", B:"#7EC8E3", C:"#A09BC0", D:"#555577" };
const TIER_BG = {
  S:"rgba(240,192,64,0.15)", A:"rgba(46,204,138,0.15)",
  B:"rgba(126,200,227,0.12)", C:"rgba(160,155,192,0.1)", D:"rgba(85,85,119,0.1)"
};
const TIER_SCORES  = { S:5, A:4, B:3, C:2, D:1 };
const SLOT_WEIGHTS = { 10:1.5, 25:1.25, 50:1.0, 70:0.75, 80:0.5 };
const SLOT_LEVELS  = [10, 25, 50, 70, 80];
const VIEWS = { ADD:"add", COMPARE:"compare", ROSTER:"roster", TEAM:"team" };

// ── Global game data (loaded async) ──────────────────────────────────────────
let GAME = null;

let _idCounter = 0;
const makeId = n => `${n}_${Date.now()}_${++_idCounter}`;
const getTier = n => (GAME?.subskills?.[n]?.tier) || "C";

function scoreSubskills(subskills) {
  let s = 0;
  for (const [level, entry] of Object.entries(subskills)) {
    if (!entry || entry.locked || !entry.name) continue;
    s += TIER_SCORES[getTier(entry.name)] * (SLOT_WEIGHTS[parseInt(level)] || 1);
  }
  return Math.round(s * 10) / 10;
}
function freqToSecs(f) {
  if (typeof f === "number") return f;
  const m = String(f).match(/(\d+)\s*min[s]?\s*(\d+)?\s*sec[s]?/);
  if (m) return parseInt(m[1]) * 60 + (parseInt(m[2]) || 0);
  return 9999;
}

// Main skill contribution: relative curve value at the Pokemon's current
// skill level, normalized against a baseline of 1.5 (a mid-tier lvl-1 skill)
// so it nudges the score without overwhelming subskills/frequency.
function scoreMainSkill(p) {
  const skillData = GAME?.mainSkills?.[p.mainSkill];
  if (!skillData) return 0;
  const lvl = Math.max(1, Math.min(p.mainSkillLevel || 1, skillData.maxLevel));
  const curveValue = skillData.relativeCurve[lvl - 1] || skillData.relativeCurve[0];
  return Math.round(((curveValue / 1.5) * 3) * 10) / 10; // scaled to ~0-7 range
}

function totalScore(p) {
  return scoreSubskills(p.subskills) * 2 + 3600 / freqToSecs(p.frequency) + scoreMainSkill(p);
}

// ── UI atoms ──────────────────────────────────────────────────────────────────
function SubskillBadge({name, locked, level}) {
  if (!name) return null;
  const tier = getTier(name);
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,
      background:locked?"rgba(255,255,255,0.04)":TIER_BG[tier],
      border:`1px solid ${locked?"rgba(255,255,255,0.08)":TIER_COLORS[tier]+"55"}`,
      opacity:locked?0.5:1,marginBottom:5}}>
      <span style={{fontSize:10,fontWeight:700,color:locked?"#666":TIER_COLORS[tier],
        fontFamily:"monospace",minWidth:14}}>{locked?"🔒":tier}</span>
      <span style={{fontSize:11,color:locked?"#666":"#E8E4F0"}}>{name}</span>
      <span style={{fontSize:9,color:"#555577",marginLeft:"auto",fontFamily:"monospace"}}>Lv.{level}</span>
    </div>
  );
}

function RadarBar({label, value, max, color}) {
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontSize:10,color:"#A09BC0",fontFamily:"monospace"}}>{label}</span>
        <span style={{fontSize:10,color,fontFamily:"monospace",fontWeight:700}}>{value}</span>
      </div>
      <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2}}>
        <div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:2}}/>
      </div>
    </div>
  );
}

function Toast({msg}) {
  return (
    <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",
      background:"rgba(46,204,138,0.95)",color:"#0D1B2A",padding:"10px 20px",
      borderRadius:20,fontSize:13,fontWeight:700,zIndex:100,
      boxShadow:"0 4px 20px rgba(0,0,0,0.4)",whiteSpace:"nowrap"}}>{msg}</div>
  );
}

function PokemonCard({pokemon, rank, isWinner, onAddToRoster, inRoster, onRemoveFromRoster, onEdit}) {
  const helpsPerHour  = Math.round(3600 / freqToSecs(pokemon.frequency) * 10) / 10;
  const subskillScore = scoreSubskills(pokemon.subskills);
  const rankColors = ["#F0C040","#A09BC0","#CD7F32","#7EC8E3","#2ECC8A"];
  const rankLabels = ["#1 RECOMENDADO","#2","#3","#4","#5"];
  const nat = GAME?.natures?.[pokemon.nature] || {};

  return (
    <div style={{
      background:isWinner
        ?"linear-gradient(135deg,rgba(75,45,143,0.35),rgba(13,27,42,0.9))"
        :"rgba(13,27,42,0.7)",
      border:`1px solid ${isWinner?"#4B2D8F":"rgba(255,255,255,0.07)"}`,
      borderRadius:16,padding:20,position:"relative",
      boxShadow:isWinner?"0 0 24px rgba(75,45,143,0.3)":"none",marginBottom:20}}>

      {rank !== undefined && (
        <div style={{position:"absolute",top:-10,left:16,
          background:rankColors[rank]||"#555577",color:"#0D1B2A",
          fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20}}>
          {rankLabels[rank]||`#${rank+1}`}
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
        marginTop:rank!==undefined?8:0,marginBottom:16}}>
        <div>
          <div style={{fontSize:22,fontWeight:700,color:"#E8E4F0"}}>{pokemon.name}</div>
          <div style={{fontSize:12,color:"#A09BC0",fontFamily:"monospace"}}>
            {pokemon.species} · Lv.{pokemon.level} · {pokemon.specialty}
          </div>
          {pokemon.berry && (
            <div style={{fontSize:10,color:"#555577",fontFamily:"monospace",marginTop:2}}>
              🍓 {pokemon.berry} · {pokemon.mainSkill} {pokemon.mainSkillLevel ? `Lv.${pokemon.mainSkillLevel}` : ""}
            </div>
          )}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20,fontWeight:700,color:"#F0C040",fontFamily:"monospace"}}>
            {(pokemon.rp||0).toLocaleString()}
          </div>
          <div style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>RP</div>
        </div>
      </div>

      <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:12,marginBottom:14}}>
        <RadarBar label="HELPS/HR"       value={helpsPerHour}       max={2.5} color="#2ECC8A"/>
        <RadarBar label="SUBSKILL SCORE" value={subskillScore}      max={12}  color="#7EC8E3"/>
        <RadarBar label="MAIN SKILL PWR" value={scoreMainSkill(pokemon)} max={7} color="#F0C040"/>
        <RadarBar label="CARRY LIMIT"    value={pokemon.carryLimit||0} max={25} color="#A09BC0"/>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"6px 10px",
        background:"rgba(255,255,255,0.04)",borderRadius:8,flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>NATURE</span>
        <span style={{fontSize:12,color:"#E8E4F0"}}>{pokemon.nature}</span>
        {nat.buff && <span style={{fontSize:10,color:"#2ECC8A",marginLeft:"auto"}}>▲ {nat.buff}</span>}
        {nat.nerf && <span style={{fontSize:10,color:"#E8604C"}}>▼ {nat.nerf}</span>}
        {!nat.buff && !nat.nerf && <span style={{fontSize:10,color:"#555577",marginLeft:"auto"}}>neutro</span>}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,
        padding:"6px 10px",background:"rgba(255,255,255,0.04)",borderRadius:8}}>
        <span style={{fontSize:10,color:"#555577",fontFamily:"monospace"}}>FRECUENCIA</span>
        <span style={{fontSize:12,color:"#F0C040",fontFamily:"monospace"}}>{pokemon.frequency}</span>
      </div>

      <div style={{fontSize:10,color:"#555577",fontFamily:"monospace",marginBottom:8,
        letterSpacing:"0.08em"}}>SUBSKILLS</div>
      {SLOT_LEVELS.map(lv => {
        const entry = pokemon.subskills?.[lv];
        return entry?.name
          ? <SubskillBadge key={lv} name={entry.name} locked={entry.locked} level={lv}/>
          : null;
      })}

      <div style={{display:"flex",gap:8,marginTop:14}}>
        {onAddToRoster && !inRoster && (
          <button onClick={()=>onAddToRoster(pokemon)}
            style={{flex:1,padding:"10px",background:"rgba(46,204,138,0.15)",
              border:"1px solid rgba(46,204,138,0.4)",borderRadius:10,color:"#2ECC8A",
              fontSize:12,fontWeight:700}}>+ AGREGAR AL ROSTER</button>
        )}
        {onAddToRoster && inRoster && (
          <div style={{flex:1,padding:"10px",textAlign:"center",
            background:"rgba(46,204,138,0.08)",border:"1px solid rgba(46,204,138,0.2)",
            borderRadius:10,color:"#2ECC8A",fontSize:12,fontWeight:700}}>✓ EN TU ROSTER</div>
        )}
        {onEdit && (
          <button onClick={()=>onEdit(pokemon)}
            style={{flex:1,padding:"10px",background:"rgba(126,200,227,0.1)",
              border:"1px solid rgba(126,200,227,0.3)",borderRadius:10,color:"#7EC8E3",
              fontSize:12,fontWeight:600}}>✏️ EDITAR</button>
        )}
        {onRemoveFromRoster && (
          <button onClick={()=>onRemoveFromRoster(pokemon.id)}
            style={{flex:1,padding:"10px",background:"rgba(232,96,76,0.1)",
              border:"1px solid rgba(232,96,76,0.3)",borderRadius:10,color:"#E8604C",
              fontSize:12,fontWeight:600}}>🗑 REMOVER</button>
        )}
      </div>
    </div>
  );
}

// ── Species Autocomplete ──────────────────────────────────────────────────────
function SpeciesInput({value, onSelect}) {
  const [text, setText] = useState(value || "");
  const [open, setOpen] = useState(false);
  useEffect(() => setText(value || ""), [value]);

  const matches = text.length >= 1 && GAME
    ? Object.keys(GAME.species).filter(s => s.toLowerCase().startsWith(text.toLowerCase())).slice(0, 8)
    : [];

  return (
    <div style={{position:"relative"}}>
      <input value={text} placeholder="ej. Latios"
        onChange={e => { setText(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}/>
      {open && matches.length > 0 && (
        <div className="autocomplete-list">
          {matches.map(s => (
            <div key={s} className="autocomplete-item"
              onClick={() => { onSelect(s); setText(s); setOpen(false); }}>
              <span style={{fontWeight:600}}>{s}</span>
              <span style={{fontSize:10,color:"#555577",marginLeft:8,fontFamily:"monospace"}}>
                {GAME.species[s].specialty} · {GAME.species[s].berry}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Data Entry Form ───────────────────────────────────────────────────────────
const EMPTY_FORM = {
  species: "", name: "", level: "", rp: "", freqMins: "", freqSecs: "",
  carryLimit: "", nature: "", mainSkill: "", mainSkillLevel: "1",
  sub10: "", sub25: "", sub50: "", sub70: "", sub80: ""
};

function AddView({onSave, onCompareAdd, editTarget, onDoneEdit}) {
  const [form, setForm] = useState(EMPTY_FORM);
  const [toast, setToast] = useState("");
  const isEdit = !!editTarget;

  useEffect(() => {
    if (editTarget) {
      const fs = freqToSecs(editTarget.frequency);
      setForm({
        species: editTarget.species || "",
        name: editTarget.name || "",
        level: String(editTarget.level || ""),
        rp: String(editTarget.rp || ""),
        freqMins: String(Math.floor(fs / 60)),
        freqSecs: String(fs % 60),
        carryLimit: String(editTarget.carryLimit || ""),
        nature: editTarget.nature || "",
        mainSkill: editTarget.mainSkill || "",
        mainSkillLevel: String(editTarget.mainSkillLevel || "1"),
        sub10: editTarget.subskills?.[10]?.name || "",
        sub25: editTarget.subskills?.[25]?.name || "",
        sub50: editTarget.subskills?.[50]?.name || "",
        sub70: editTarget.subskills?.[70]?.name || "",
        sub80: editTarget.subskills?.[80]?.name || "",
      });
    }
  }, [editTarget]);

  function set(k, v) { setForm(prev => ({...prev, [k]: v})); }
  function showToast(m) { setToast(m); setTimeout(()=>setToast(""), 2200); }

  const speciesData = GAME?.species?.[form.species];
  const natureData  = GAME?.natures?.[form.nature];
  const level = parseInt(form.level) || 0;
  const subskillNames = GAME ? Object.keys(GAME.subskills) : [];

  const chosen = [form.sub10, form.sub25, form.sub50, form.sub70, form.sub80].filter(Boolean);

  function buildPokemon() {
    const subskills = {};
    [["sub10",10],["sub25",25],["sub50",50],["sub70",70],["sub80",80]].forEach(([k, lv]) => {
      if (form[k]) subskills[lv] = { name: form[k], locked: level < lv };
    });
    return {
      id: editTarget?.id || makeId(form.name || form.species),
      name: form.name || form.species,
      species: form.species,
      specialty: speciesData?.specialty || "?",
      berry: speciesData?.berry || "?",
      mainSkill: form.mainSkill || speciesData?.mainSkill || "?",
      mainSkillLevel: parseInt(form.mainSkillLevel) || 1,
      level,
      rp: parseInt(form.rp) || 0,
      frequency: `${parseInt(form.freqMins)||0} mins ${parseInt(form.freqSecs)||0} secs`,
      carryLimit: parseInt(form.carryLimit) || 0,
      nature: form.nature,
      subskills
    };
  }

  const valid = form.species && form.level && form.nature && form.sub10 && form.sub25;

  function handleSave() {
    if (!valid) return;
    onSave(buildPokemon());
    if (isEdit) { onDoneEdit(); showToast("✓ Pokémon actualizado"); }
    else { setForm(EMPTY_FORM); showToast("✓ Guardado en el roster"); }
  }

  function handleAddCompare() {
    if (!valid) return;
    onCompareAdd(buildPokemon());
    setForm(EMPTY_FORM);
    showToast("✓ Agregado a comparación");
  }

  function SubSelect({slotKey, slotLevel}) {
    const locked = level > 0 && level < slotLevel;
    return (
      <div className="field" style={{flex:1,minWidth:"46%"}}>
        <label>Lv.{slotLevel} {locked && "🔒"}</label>
        <select value={form[slotKey]} onChange={e=>set(slotKey, e.target.value)}
          style={{opacity: locked ? 0.6 : 1, fontSize:12, padding:"9px 8px"}}>
          <option value="">— vacío —</option>
          {subskillNames.map(s => (
            <option key={s} value={s} disabled={chosen.includes(s) && form[slotKey] !== s}>
              [{GAME.subskills[s].tier}] {s}
            </option>
          ))}
        </select>
      </div>
    );
  }

  return (
    <div>
      {toast && <Toast msg={toast}/>}
      <div style={{textAlign:"center",padding:"14px 0 18px"}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>
          {isEdit ? "Editar Pokémon" : "Agregar Pokémon"}
        </div>
        <div style={{fontSize:12,color:"#A09BC0"}}>
          {isEdit ? `Editando a ${editTarget.name}` : "Data entry rápido con autocompletado"}
        </div>
      </div>

      {/* Species */}
      <div className="field">
        <label>Especie *</label>
        <SpeciesInput value={form.species}
          onSelect={s => setForm(prev => ({...prev, species: s, mainSkill: GAME?.species?.[s]?.mainSkill || ""}))}/>
        {speciesData && (
          <div style={{marginTop:6,padding:"8px 10px",background:"rgba(46,204,138,0.08)",
            border:"1px solid rgba(46,204,138,0.2)",borderRadius:8,fontSize:11,
            color:"#2ECC8A",fontFamily:"monospace"}}>
            ✓ {speciesData.specialty} · 🍓 {speciesData.berry}
          </div>
        )}
      </div>

      {/* Main Skill — autofilled but editable (game data can be outdated) */}
      <div className="field">
        <label>Main Skill (editable si no coincide con el juego)</label>
        <input value={form.mainSkill} placeholder="ej. Heal Pulse (Energizing Cheer S)"
          onChange={e=>set("mainSkill", e.target.value)}/>
      </div>

      {/* Main Skill Level — critical for comparison weight */}
      <div className="field">
        <label>Nivel del Main Skill (1-7)</label>
        <select value={form.mainSkillLevel} onChange={e=>set("mainSkillLevel", e.target.value)}>
          {[1,2,3,4,5,6,7].map(lv => {
            const skillMax = GAME?.mainSkills?.[form.mainSkill]?.maxLevel || 6;
            return <option key={lv} value={lv} disabled={lv > skillMax}>
              Lv.{lv}{lv > skillMax ? " (no disponible)" : ""}
            </option>;
          })}
        </select>
        <div style={{marginTop:6,fontSize:10,color:"#555577",fontFamily:"monospace",lineHeight:1.5}}>
          Sube con Main Skill Seeds o automático al evolucionar
        </div>
      </div>

      {/* Nickname + level */}
      <div style={{display:"flex",gap:10}}>
        <div className="field" style={{flex:2}}>
          <label>Apodo</label>
          <input value={form.name} placeholder="ej. Pochi" onChange={e=>set("name", e.target.value)}/>
        </div>
        <div className="field" style={{flex:1}}>
          <label>Nivel *</label>
          <input type="number" inputMode="numeric" value={form.level} placeholder="27"
            onChange={e=>set("level", e.target.value)}/>
        </div>
      </div>

      {/* RP + carry */}
      <div style={{display:"flex",gap:10}}>
        <div className="field" style={{flex:1}}>
          <label>RP</label>
          <input type="number" inputMode="numeric" value={form.rp} placeholder="1427"
            onChange={e=>set("rp", e.target.value)}/>
        </div>
        <div className="field" style={{flex:1}}>
          <label>Carry Limit</label>
          <input type="number" inputMode="numeric" value={form.carryLimit} placeholder="19"
            onChange={e=>set("carryLimit", e.target.value)}/>
        </div>
      </div>

      {/* Frequency */}
      <div style={{display:"flex",gap:10}}>
        <div className="field" style={{flex:1}}>
          <label>Frecuencia — Mins</label>
          <input type="number" inputMode="numeric" value={form.freqMins} placeholder="38"
            onChange={e=>set("freqMins", e.target.value)}/>
        </div>
        <div className="field" style={{flex:1}}>
          <label>Secs</label>
          <input type="number" inputMode="numeric" value={form.freqSecs} placeholder="2"
            onChange={e=>set("freqSecs", e.target.value)}/>
        </div>
      </div>

      {/* Nature */}
      <div className="field">
        <label>Nature *</label>
        <select value={form.nature} onChange={e=>set("nature", e.target.value)}>
          <option value="">— selecciona —</option>
          {GAME && Object.keys(GAME.natures).map(n => <option key={n} value={n}>{n}</option>)}
        </select>
        {natureData && (natureData.buff || natureData.nerf) && (
          <div style={{marginTop:6,display:"flex",gap:12,fontSize:11,fontFamily:"monospace"}}>
            {natureData.buff && <span style={{color:"#2ECC8A"}}>▲ {natureData.buff}</span>}
            {natureData.nerf && <span style={{color:"#E8604C"}}>▼ {natureData.nerf}</span>}
          </div>
        )}
        {natureData && !natureData.buff && !natureData.nerf && (
          <div style={{marginTop:6,fontSize:11,color:"#555577",fontFamily:"monospace"}}>nature neutra</div>
        )}
      </div>

      {/* Subskills */}
      <div style={{fontSize:10,color:"#555577",fontFamily:"monospace",margin:"6px 0 8px",
        letterSpacing:"0.08em"}}>SUBSKILLS (Lv.10 y Lv.25 requeridos)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
        <SubSelect slotKey="sub10" slotLevel={10}/>
        <SubSelect slotKey="sub25" slotLevel={25}/>
        <SubSelect slotKey="sub50" slotLevel={50}/>
        <SubSelect slotKey="sub70" slotLevel={70}/>
        <SubSelect slotKey="sub80" slotLevel={80}/>
      </div>

      {/* Actions */}
      <div style={{display:"flex",gap:10,marginTop:16}}>
        {!isEdit && (
          <button onClick={handleAddCompare} disabled={!valid}
            style={{flex:1,padding:13,border:"none",borderRadius:12,fontSize:13,fontWeight:700,
              background:valid?"linear-gradient(135deg,#4B2D8F,#7B4DBF)":"rgba(255,255,255,0.05)",
              color:valid?"#E8E4F0":"#555577"}}>⚔️ A COMPARAR</button>
        )}
        <button onClick={handleSave} disabled={!valid}
          style={{flex:1,padding:13,border:"none",borderRadius:12,fontSize:13,fontWeight:700,
            background:valid?"linear-gradient(135deg,#2ECC8A,#1a9960)":"rgba(255,255,255,0.05)",
            color:valid?"#0D1B2A":"#555577"}}>
          {isEdit ? "💾 GUARDAR CAMBIOS" : "📋 GUARDAR EN ROSTER"}
        </button>
      </div>
      {isEdit && (
        <button onClick={onDoneEdit}
          style={{width:"100%",marginTop:10,padding:12,background:"transparent",
            border:"1px solid rgba(255,255,255,0.1)",borderRadius:12,color:"#A09BC0",fontSize:13}}>
          Cancelar edición
        </button>
      )}
    </div>
  );
}

// ── Compare View ──────────────────────────────────────────────────────────────
function CompareView({compared, onAddToRoster, rosterIds, onClear, onGoAdd}) {
  if (compared.length === 0) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:40,marginBottom:16}}>⚔️</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Nada que comparar aún</div>
      <div style={{fontSize:13,color:"#A09BC0",marginBottom:24}}>
        Agrega Pokémon con "⚔️ A Comparar" desde el formulario
      </div>
      <button onClick={onGoAdd}
        style={{padding:"12px 24px",background:"linear-gradient(135deg,#4B2D8F,#7B4DBF)",
          border:"none",borderRadius:12,color:"#E8E4F0",fontSize:13,fontWeight:700}}>
        + AGREGAR POKÉMON
      </button>
    </div>
  );

  const sorted = [...compared].sort((a,b) => totalScore(b) - totalScore(a));
  return (
    <div>
      <div style={{background:"rgba(75,45,143,0.15)",border:"1px solid rgba(75,45,143,0.25)",
        borderRadius:12,padding:"14px 16px",marginBottom:20,
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontSize:11,color:"#555577",fontFamily:"monospace",marginBottom:2}}>RECOMENDACIÓN</div>
          <div style={{fontSize:16,fontWeight:700,color:"#F0C040"}}>Invertir en {sorted[0]?.name}</div>
        </div>
        <button onClick={onClear}
          style={{background:"rgba(232,96,76,0.1)",border:"1px solid rgba(232,96,76,0.3)",
            borderRadius:8,padding:"6px 12px",fontSize:11,color:"#E8604C",fontFamily:"monospace"}}>
          LIMPIAR
        </button>
      </div>
      {sorted.map((p,i) => (
        <PokemonCard key={p.id} pokemon={p} rank={i} isWinner={i===0}
          onAddToRoster={onAddToRoster} inRoster={rosterIds.has(p.id)}/>
      ))}
      <div style={{padding:12,background:"rgba(255,255,255,0.03)",borderRadius:8,
        fontSize:10,color:"#555577",fontFamily:"monospace",lineHeight:1.6}}>
        * Análisis basado en subskills activos + proyección a Lv.70 · Data v{GAME?.meta?.version}
      </div>
    </div>
  );
}

// ── Roster View ───────────────────────────────────────────────────────────────
function RosterView({roster, onRemove, onEdit, onGoAdd, onExport, onImport}) {
  const fileRef = useRef();

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <div style={{fontSize:11,color:"#555577",fontFamily:"monospace"}}>TU ROSTER</div>
          <div style={{fontSize:18,fontWeight:700}}>{roster.length} Pokémon</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onExport}
            style={{padding:"8px 12px",background:"rgba(126,200,227,0.1)",
              border:"1px solid rgba(126,200,227,0.3)",borderRadius:16,color:"#7EC8E3",
              fontSize:11,fontWeight:600}}>⬇ EXPORT</button>
          <button onClick={()=>fileRef.current?.click()}
            style={{padding:"8px 12px",background:"rgba(126,200,227,0.1)",
              border:"1px solid rgba(126,200,227,0.3)",borderRadius:16,color:"#7EC8E3",
              fontSize:11,fontWeight:600}}>⬆ IMPORT</button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}}
            onChange={e => {
              const f = e.target.files[0];
              if (!f) return;
              const r = new FileReader();
              r.onload = ev => onImport(ev.target.result);
              r.readAsText(f);
              e.target.value = "";
            }}/>
        </div>
      </div>

      {roster.length === 0 ? (
        <div style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:40,marginBottom:16}}>🌙</div>
          <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Tu roster está vacío</div>
          <div style={{fontSize:13,color:"#A09BC0",marginBottom:24}}>
            Agrega tu primer Pokémon para empezar
          </div>
          <button onClick={onGoAdd}
            style={{padding:"12px 24px",background:"linear-gradient(135deg,#4B2D8F,#7B4DBF)",
              border:"none",borderRadius:12,color:"#E8E4F0",fontSize:13,fontWeight:700}}>
            + AGREGAR POKÉMON
          </button>
        </div>
      ) : (
        [...roster].sort((a,b) => totalScore(b) - totalScore(a)).map(p => (
          <PokemonCard key={p.id} pokemon={p} onRemoveFromRoster={onRemove} onEdit={onEdit}/>
        ))
      )}
    </div>
  );
}

// ── Team Builder ──────────────────────────────────────────────────────────────
function buildTeam(roster, islandName) {
  const island = GAME.islands[islandName];
  const acceptsAll = island.berries.includes("all");
  const berryMatch = p => acceptsAll || island.berries.includes(p.berry);

  // Score with island context: berry match is a big multiplier for berry specialists
  function teamScore(p) {
    let s = totalScore(p);
    if (berryMatch(p)) {
      s += p.specialty === "Berries" ? 8 : 3;
    }
    return s;
  }

  const pool = [...roster].sort((a,b) => teamScore(b) - teamScore(a));
  const team = [];
  const used = new Set();

  function pick(filterFn, role) {
    const found = pool.find(p => !used.has(p.id) && filterFn(p));
    if (found) { used.add(found.id); team.push({...found, role}); return true; }
    return false;
  }

  // Slot 1: best Ingredient specialist (dish support)
  pick(p => p.specialty === "Ingredients", "🥘 Ingredientes");
  // Slot 2: best Skill specialist (utility/energy)
  pick(p => p.specialty === "Skills", "⚡ Skills / Utility");
  // Slot 3: best berry-matching Berry specialist (island synergy)
  pick(p => p.specialty === "Berries" && berryMatch(p), "🍓 Berries (isla)");
  // Slots 4-5: best remaining by score
  while (team.length < 5) {
    if (!pick(() => true, "⭐ Mejor disponible")) break;
  }

  // Analysis
  const specialties = team.reduce((acc,p) => { acc[p.specialty]=(acc[p.specialty]||0)+1; return acc; }, {});
  const matches = team.filter(berryMatch).length;
  const warnings = [];
  if (!specialties["Ingredients"]) warnings.push("Sin ingredient specialist — puede faltar para cocinar");
  if (!specialties["Skills"]) warnings.push("Sin skill specialist — menos utilidad de main skills");
  if (matches < 2) warnings.push("Pocos Pokémon con berry de la isla — Drowsy Power bajo");
  if (roster.length < 5) warnings.push(`Solo tienes ${roster.length} Pokémon en el roster`);

  return { team, specialties, matches, warnings };
}

function TeamView({roster, onGoAdd}) {
  const [island, setIsland] = useState("");
  const [result, setResult] = useState(null);

  if (roster.length === 0) return (
    <div style={{textAlign:"center",padding:"60px 20px"}}>
      <div style={{fontSize:40,marginBottom:16}}>🏝️</div>
      <div style={{fontSize:18,fontWeight:700,marginBottom:8}}>Necesitas Pokémon en tu roster</div>
      <div style={{fontSize:13,color:"#A09BC0",marginBottom:24}}>
        El Team Builder arma equipos desde tu roster guardado
      </div>
      <button onClick={onGoAdd}
        style={{padding:"12px 24px",background:"linear-gradient(135deg,#4B2D8F,#7B4DBF)",
          border:"none",borderRadius:12,color:"#E8E4F0",fontSize:13,fontWeight:700}}>
        + AGREGAR POKÉMON
      </button>
    </div>
  );

  return (
    <div>
      <div style={{textAlign:"center",padding:"14px 0 18px"}}>
        <div style={{fontSize:22,fontWeight:800,marginBottom:4}}>Team Builder</div>
        <div style={{fontSize:12,color:"#A09BC0"}}>Equipo óptimo para la semana desde tu roster</div>
      </div>

      <div className="field">
        <label>Isla de la semana *</label>
        <select value={island} onChange={e=>{setIsland(e.target.value); setResult(null);}}>
          <option value="">— selecciona la isla —</option>
          {Object.keys(GAME.islands).map(i => (
            <option key={i} value={i}>{i}</option>
          ))}
        </select>
        {island && (
          <div style={{marginTop:6,padding:"8px 10px",background:"rgba(126,200,227,0.08)",
            border:"1px solid rgba(126,200,227,0.2)",borderRadius:8,fontSize:11,
            color:"#7EC8E3",fontFamily:"monospace"}}>
            🍓 {GAME.islands[island].berries.includes("all")
              ? "Acepta todas las berries"
              : "Berries: " + GAME.islands[island].berries.join(", ")}
          </div>
        )}
      </div>

      <button onClick={()=>setResult(buildTeam(roster, island))} disabled={!island}
        style={{width:"100%",padding:14,border:"none",borderRadius:12,fontSize:14,fontWeight:700,
          letterSpacing:"0.05em",marginBottom:20,
          background:island?"linear-gradient(135deg,#4B2D8F,#7B4DBF)":"rgba(255,255,255,0.05)",
          color:island?"#E8E4F0":"#555577"}}>
        🏗️ ARMAR EQUIPO ÓPTIMO
      </button>

      {result && (
        <div>
          {/* Summary */}
          <div style={{background:"rgba(75,45,143,0.15)",border:"1px solid rgba(75,45,143,0.25)",
            borderRadius:12,padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:11,color:"#555577",fontFamily:"monospace",marginBottom:6}}>BALANCE DEL EQUIPO</div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,fontFamily:"monospace"}}>
              <span style={{color:"#F0C040"}}>🍓 {result.specialties["Berries"]||0} Berries</span>
              <span style={{color:"#2ECC8A"}}>🥘 {result.specialties["Ingredients"]||0} Ingredients</span>
              <span style={{color:"#7EC8E3"}}>⚡ {result.specialties["Skills"]||0} Skills</span>
              <span style={{color:"#A09BC0"}}>🏝️ {result.matches}/5 berry match</span>
            </div>
          </div>

          {/* Warnings */}
          {result.warnings.length > 0 && (
            <div style={{background:"rgba(240,192,64,0.08)",border:"1px solid rgba(240,192,64,0.25)",
              borderRadius:12,padding:"12px 14px",marginBottom:16}}>
              {result.warnings.map((w,i) => (
                <div key={i} style={{fontSize:11,color:"#F0C040",lineHeight:1.7,fontFamily:"monospace"}}>⚠ {w}</div>
              ))}
            </div>
          )}

          {/* Team members */}
          {result.team.map((p,i) => (
            <div key={p.id} style={{position:"relative"}}>
              <div style={{position:"absolute",top:-8,right:16,zIndex:5,
                background:"#16233a",border:"1px solid rgba(75,45,143,0.5)",
                fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,
                color:"#E8E4F0",fontFamily:"monospace"}}>
                {p.role}
              </div>
              <PokemonCard pokemon={p}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [gameLoaded, setGameLoaded] = useState(false);
  const [gameError, setGameError]   = useState(false);
  const [view, setView]             = useState(VIEWS.ADD);
  const [compared, setCompared]     = useState([]);
  const [editTarget, setEditTarget] = useState(null);
  const [toast, setToast]           = useState("");
  const [roster, setRoster]         = useState(() => {
    try { return JSON.parse(localStorage.getItem("pks_roster_v2") || "[]"); }
    catch { return []; }
  });

  // Load game data
  useEffect(() => {
    fetch("./gameData.json")
      .then(r => r.json())
      .then(data => { GAME = data; setGameLoaded(true); })
      .catch(() => setGameError(true));
  }, []);

  // Register service worker
  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(e => console.log("SW error:", e));
    }
  }, []);

  useEffect(() => {
    localStorage.setItem("pks_roster_v2", JSON.stringify(roster));
  }, [roster]);

  function showToast(m) { setToast(m); setTimeout(()=>setToast(""), 2200); }

  function saveToRoster(pokemon) {
    setRoster(prev => {
      const idx = prev.findIndex(p => p.id === pokemon.id);
      if (idx >= 0) {
        const copy = [...prev]; copy[idx] = pokemon; return copy;
      }
      return [...prev, pokemon];
    });
  }

  function removeFromRoster(id) {
    setRoster(prev => prev.filter(p => p.id !== id));
  }

  function addToCompare(pokemon) {
    setCompared(prev => [...prev, pokemon]);
  }

  function startEdit(pokemon) {
    setEditTarget(pokemon);
    setView(VIEWS.ADD);
  }

  function exportRoster() {
    const blob = new Blob([JSON.stringify(roster, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pks-roster-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importRoster(text) {
    try {
      const arr = JSON.parse(text);
      if (!Array.isArray(arr)) throw new Error();
      setRoster(prev => {
        const ids = new Set(prev.map(p => p.id));
        const news = arr.filter(p => !ids.has(p.id));
        return [...prev, ...news];
      });
      showToast(`✓ Roster importado`);
    } catch {
      showToast("⚠ Archivo inválido");
    }
  }

  const rosterIds = new Set(roster.map(p => p.id));

  const NAV = [
    { id: VIEWS.ADD,     label: "Agregar",  icon: "➕" },
    { id: VIEWS.COMPARE, label: "Comparar", icon: "⚔️" },
    { id: VIEWS.ROSTER,  label: "Roster",   icon: "📋" },
    { id: VIEWS.TEAM,    label: "Equipo",   icon: "🏝️" },
  ];

  if (gameError) return (
    <div style={{padding:40,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:16}}>⚠️</div>
      <div style={{fontSize:16,fontWeight:700}}>Error cargando datos del juego</div>
      <div style={{fontSize:13,color:"#A09BC0",marginTop:8}}>Verifica que gameData.json esté en el mismo folder</div>
    </div>
  );

  if (!gameLoaded) return (
    <div style={{padding:60,textAlign:"center"}}>
      <div style={{fontSize:40,marginBottom:16}}>🌙</div>
      <div style={{fontSize:14,color:"#A09BC0",fontFamily:"monospace"}}>Cargando datos del juego...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",
      background:"linear-gradient(160deg,#0D1B2A 0%,#0a1220 60%,#130a28 100%)",paddingBottom:70}}>

      {toast && <Toast msg={toast}/>}

      <div style={{background:"rgba(75,45,143,0.15)",borderBottom:"1px solid rgba(75,45,143,0.3)",
        padding:"14px 16px",position:"sticky",top:0,backdropFilter:"blur(12px)",zIndex:10}}>
        <div style={{fontSize:18,fontWeight:800,color:"#E8E4F0"}}>🌙 SLEEP OPTIMIZER</div>
        <div style={{fontSize:10,color:"#7B4DBF",fontFamily:"monospace",letterSpacing:"0.1em"}}>
          PWA · OFFLINE READY · v{GAME.meta.version}
        </div>
      </div>

      <div style={{padding:"20px 16px",maxWidth:480,margin:"0 auto"}}>
        {view === VIEWS.ADD && (
          <AddView
            onSave={p => { saveToRoster(p); }}
            onCompareAdd={addToCompare}
            editTarget={editTarget}
            onDoneEdit={() => { setEditTarget(null); setView(VIEWS.ROSTER); }}/>
        )}
        {view === VIEWS.COMPARE && (
          <CompareView compared={compared} onAddToRoster={p => { saveToRoster(p); }}
            rosterIds={rosterIds} onClear={()=>setCompared([])}
            onGoAdd={()=>setView(VIEWS.ADD)}/>
        )}
        {view === VIEWS.ROSTER && (
          <RosterView roster={roster} onRemove={removeFromRoster} onEdit={startEdit}
            onGoAdd={()=>setView(VIEWS.ADD)} onExport={exportRoster} onImport={importRoster}/>
        )}
        {view === VIEWS.TEAM && (
          <TeamView roster={roster} onGoAdd={()=>setView(VIEWS.ADD)}/>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(13,27,42,0.95)",
        borderTop:"1px solid rgba(75,45,143,0.3)",backdropFilter:"blur(12px)",display:"flex",zIndex:10}}>
        {NAV.map(n => (
          <button key={n.id} onClick={()=>{ setView(n.id); if (n.id !== VIEWS.ADD) setEditTarget(null); }}
            style={{flex:1,padding:"12px 8px",background:"transparent",border:"none",
              color:view===n.id?"#F0C040":"#555577",
              borderTop:view===n.id?"2px solid #F0C040":"2px solid transparent",
              display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:18}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:600,letterSpacing:"0.05em"}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>

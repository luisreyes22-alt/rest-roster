<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#F1F8E9" id="theme-color-meta"/>
<title>DrowsyCraft</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.44.0/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #F1F8E9;
  --surface: #FFFFFF;
  --surface-alt: #E4F2D3;
  --border: #D0E6B8;
  --border-strong: #B3D48D;
  --text-primary: #223B16;
  --text-secondary: #4C6B39;
  --text-muted: #93A87D;
  --accent: #4F9A2E;
  --accent-strong: #3B7A20;
  --accent-soft: #DCEFC0;
  --on-accent: #FBFFF3;
  --success: #2E8B57;
  --success-bg: #E1F3E7;
  --info: #2E86AB;
  --info-bg: #E1F0F7;
  --danger: #C1440E;
  --danger-bg: #FBEADF;
  --tier-s: #C9971C; --tier-s-bg: #FBF3DC;
  --tier-a: #4F9A2E; --tier-a-bg: #DCEFC0;
  --tier-b: #2E86AB; --tier-b-bg: #E1F0F7;
  --tier-c: #8A9478; --tier-c-bg: #EDF2E2;
  --tier-d: #B3D48D; --tier-d-bg: #EDF2E2;
  --radius-card: 16px;
  --radius-control: 12px;
}
[data-theme="dark"] {
  --bg: #10180C;
  --surface: #182410;
  --surface-alt: #1F2E15;
  --border: #2C3D1E;
  --border-strong: #3C5029;
  --text-primary: #EAF3DE;
  --text-secondary: #B8CBA0;
  --text-muted: #718A5C;
  --accent: #7FCB4B;
  --accent-strong: #66AC38;
  --accent-soft: #24391A;
  --on-accent: #0E1608;
  --success: #6FCB9B;
  --success-bg: #1B3324;
  --info: #7FC1E0;
  --info-bg: #17303C;
  --danger: #E08B5C;
  --danger-bg: #3A2417;
  --tier-s: #E8C15C; --tier-s-bg: #3A2F13;
  --tier-a: #7FCB4B; --tier-a-bg: #24391A;
  --tier-b: #7FC1E0; --tier-b-bg: #17303C;
  --tier-c: #9DAF89; --tier-c-bg: #1F2E15;
  --tier-d: #718A5C; --tier-d-bg: #1F2E15;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-primary); font-family: Inter, -apple-system, sans-serif; }
input, select, textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-control); color: var(--text-primary); padding: 11px 12px; font-size: 14px; outline: none;
}
input::placeholder { color: var(--text-muted); }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select { appearance: none; -webkit-appearance: none; }
label { display: block; font-size: 10px; color: var(--text-secondary); font-family: monospace;
  letter-spacing: 0.08em; margin-bottom: 5px; text-transform: uppercase; }
button { cursor: pointer; font-family: inherit; }
.field { margin-bottom: 14px; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
  background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-control);
  max-height: 200px; overflow-y: auto; margin-top: 4px; box-shadow: 0 4px 16px rgba(43,36,23,0.12); }
.autocomplete-item { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
.autocomplete-item:active { background: var(--surface-alt); }

/* ── Responsive app shell ──────────────────────────────────────────────────
   Mobile-first by default (single column, bottom tab bar, 480px content cap).
   At >=900px ("desktop"), the nav becomes a fixed left sidebar and the content
   area is freed to fill the viewport so multi-column card grids have room. */
.app-content { max-width: 480px; margin: 0 auto; padding: 20px 16px 86px; }
.app-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  border-top: 1px solid var(--border); display: flex; z-index: 10; }
.app-nav button { flex: 1; padding: 12px 8px; border-top: 2px solid transparent; }
.app-nav button[data-active="true"] { border-top: 2px solid var(--accent); }

.card-grid { display: grid; grid-template-columns: 1fr; gap: 12px; align-items: start; }
.dex-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; align-items: start; }

@media (min-width: 900px) {
  body { --sidebar-width: 208px; }
  .app-content { max-width: none; padding: 28px 32px 32px calc(var(--sidebar-width) + 32px); }
  .app-nav { top: 0; bottom: 0; right: auto; width: var(--sidebar-width);
    border-top: none; border-right: 1px solid var(--border); flex-direction: column;
    padding-top: 76px; }
  .app-nav button { flex: none; flex-direction: row !important; justify-content: flex-start;
    gap: 10px !important; padding: 12px 20px; border-top: none !important;
    border-left: 3px solid transparent; }
  .app-nav button[data-active="true"] { border-left: 3px solid var(--accent); background: var(--accent-soft); }
  .app-nav button span { font-size: 12px !important; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
  .card-grid[data-span-open="true"] { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }
  .dex-grid { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px; }
}

@media (min-width: 1400px) {
  .app-content { padding-right: 48px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="./formulas.js"></script>
<script type="text/babel" src="./app.jsx"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#F1F8E9" id="theme-color-meta"/>
<title>Sleep Optimizer</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.44.0/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root {
  --bg: #F1F8E9;
  --surface: #FFFFFF;
  --surface-alt: #E4F2D3;
  --border: #D0E6B8;
  --border-strong: #B3D48D;
  --text-primary: #223B16;
  --text-secondary: #4C6B39;
  --text-muted: #93A87D;
  --accent: #4F9A2E;
  --accent-strong: #3B7A20;
  --accent-soft: #DCEFC0;
  --on-accent: #FBFFF3;
  --success: #2E8B57;
  --success-bg: #E1F3E7;
  --info: #2E86AB;
  --info-bg: #E1F0F7;
  --danger: #C1440E;
  --danger-bg: #FBEADF;
  --tier-s: #C9971C; --tier-s-bg: #FBF3DC;
  --tier-a: #4F9A2E; --tier-a-bg: #DCEFC0;
  --tier-b: #2E86AB; --tier-b-bg: #E1F0F7;
  --tier-c: #8A9478; --tier-c-bg: #EDF2E2;
  --tier-d: #B3D48D; --tier-d-bg: #EDF2E2;
  --radius-card: 16px;
  --radius-control: 12px;
}
[data-theme="dark"] {
  --bg: #10180C;
  --surface: #182410;
  --surface-alt: #1F2E15;
  --border: #2C3D1E;
  --border-strong: #3C5029;
  --text-primary: #EAF3DE;
  --text-secondary: #B8CBA0;
  --text-muted: #718A5C;
  --accent: #7FCB4B;
  --accent-strong: #66AC38;
  --accent-soft: #24391A;
  --on-accent: #0E1608;
  --success: #6FCB9B;
  --success-bg: #1B3324;
  --info: #7FC1E0;
  --info-bg: #17303C;
  --danger: #E08B5C;
  --danger-bg: #3A2417;
  --tier-s: #E8C15C; --tier-s-bg: #3A2F13;
  --tier-a: #7FCB4B; --tier-a-bg: #24391A;
  --tier-b: #7FC1E0; --tier-b-bg: #17303C;
  --tier-c: #9DAF89; --tier-c-bg: #1F2E15;
  --tier-d: #718A5C; --tier-d-bg: #1F2E15;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-primary); font-family: Inter, -apple-system, sans-serif; }
input, select, textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-control); color: var(--text-primary); padding: 11px 12px; font-size: 14px; outline: none;
}
input::placeholder { color: var(--text-muted); }
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
select { appearance: none; -webkit-appearance: none; }
label { display: block; font-size: 10px; color: var(--text-secondary); font-family: monospace;
  letter-spacing: 0.08em; margin-bottom: 5px; text-transform: uppercase; }
button { cursor: pointer; font-family: inherit; }
.field { margin-bottom: 14px; }
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 30;
  background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-control);
  max-height: 200px; overflow-y: auto; margin-top: 4px; box-shadow: 0 4px 16px rgba(43,36,23,0.12); }
.autocomplete-item { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
.autocomplete-item:active { background: var(--surface-alt); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Tier config ───────────────────────────────────────────────────────────────
const TIER_COLORS = { S:"var(--tier-s)", A:"var(--tier-a)", B:"var(--tier-b)", C:"var(--tier-c)", D:"var(--tier-d)" };
const TIER_BG = { S:"var(--tier-s-bg)", A:"var(--tier-a-bg)", B:"var(--tier-b-bg)", C:"var(--tier-c-bg)", D:"var(--tier-d-bg)" };
const TIER_SCORES  = { S:5, A:4, B:3, C:2, D:1 };
const SLOT_WEIGHTS = { 10:1.5, 25:1.25, 50:1.0, 70:0.75, 80:0.5 };
const SLOT_LEVELS  = [10, 25, 50, 70, 80];
const VIEWS = { ADD:"add", COMPARE:"compare", ROSTER:"roster", TEAM:"team" };

// ── Global game data (loaded async) ──────────────────────────────────────────
let GAME = null;
let SPRITE_IDS = null;
const SPECIALTY_COLOR = { Berries:"var(--danger)", Ingredients:"var(--success)", Skills:"var(--info)", All:"var(--tier-s)" };
function spriteUrl(species) {
  const id = SPRITE_IDS?.[species];
  return id ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/home/${id}.png` : null;
}

let _idCounter = 0;
const makeId = n => `${n}_${Date.now()}_${++_idCounter}`;
const getTier = n => (GAME?.subskills?.[n]?.tier) || "C";

function scoreSubskills(subskills) {
  let s = 0;
  for (const [level, entry] of Object.entries(subskills)) {
    if (!entry || entry.locked || !entry.name) continue;
    s += TIER_SCORES[getTier(entry.name)] * (SLOT_WEIGHTS[parseInt(level)] || 1);
  }
  return Math.round(s * 10) / 10;
}
function freqToSecs(f) {
  if (typeof f === "number") return f;
  const m = String(f).match(/(\d+)\s*min[s]?\s*(\d+)?\s*sec[s]?/);
  if (m) return parseInt(m[1]) * 60 + (parseInt(m[2]) || 0);
  return 9999;
}

// Main skill contribution: relative curve value at the Pokemon's current
// skill level, normalized against a baseline of 1.5 (a mid-tier lvl-1 skill)
// so it nudges the score without overwhelming subskills/frequency.
function scoreMainSkill(p) {
  const skillData = GAME?.mainSkills?.[p.mainSkill];
  if (!skillData) return 0;
  const lvl = Math.max(1, Math.min(p.mainSkillLevel || 1, skillData.maxLevel));
  const curveValue = skillData.relativeCurve[lvl - 1] || skillData.relativeCurve[0];
  return Math.round(((curveValue / 1.5) * 3) * 10) / 10; // scaled to ~0-7 range
}

function totalScore(p) {
  return scoreSubskills(p.subskills) * 2 + 3600 / freqToSecs(p.frequency) + scoreMainSkill(p);
}

// ── UI atoms ──────────────────────────────────────────────────────────────────
function Icon({name, size, style}) {
  return <i className={`ti ti-${name}`} style={{fontSize:size||16,lineHeight:1,...style}} aria-hidden="true"/>;
}

function PokemonSprite({species, size}) {
  const [broken, setBroken] = useState(false);
  const url = spriteUrl(species);
  const s = size || 40;
  if (!url || broken) {
    return (
      <div style={{width:s,height:s,borderRadius:"50%",background:"var(--surface-alt)",
        border:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",
        flexShrink:0,fontSize:s*0.4,fontWeight:700,color:"var(--text-muted)"}}>
        {species?.[0] || "?"}
      </div>
    );
  }
  return (
    <div style={{width:s,height:s,borderRadius:"50%",background:"var(--surface-alt)",
      border:"1px solid var(--border)",overflow:"hidden",flexShrink:0}}>
      <img src={url} alt={species} loading="lazy" onError={()=>setBroken(true)}
        style={{width:"100%",height:"100%",objectFit:"contain"}}/>
    </div>
  );
}

function SubskillBadge({name, locked, level}) {
  if (!name) return null;
  const tier = getTier(name);
  return (
    <div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",borderRadius:8,
      background:locked?"var(--surface-alt)":TIER_BG[tier],
      border:`1px solid ${locked?"var(--border)":TIER_COLORS[tier]}`,
      opacity:locked?0.6:1,marginBottom:5}}>
      {locked
        ? <Icon name="lock" size={12} style={{color:"var(--text-muted)"}}/>
        : <span style={{fontSize:10,fontWeight:700,color:TIER_COLORS[tier],
            fontFamily:"monospace",minWidth:14}}>{tier}</span>}
      <span style={{fontSize:11,color:locked?"var(--text-muted)":"var(--text-primary)"}}>{name}</span>
      <span style={{fontSize:9,color:"var(--text-secondary)",marginLeft:"auto",fontFamily:"monospace"}}>Lv.{level}</span>
    </div>
  );
}

function RadarBar({label, value, max, color}) {
  return (
    <div style={{marginBottom:6}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
        <span style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace"}}>{label}</span>
        <span style={{fontSize:10,color,fontFamily:"monospace",fontWeight:700}}>{value}</span>
      </div>
      <div style={{height:4,background:"var(--surface-alt)",borderRadius:2}}>
        <div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color,borderRadius:2}}/>
      </div>
    </div>
  );
}

function Toast({msg}) {
  return (
    <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",
      background:"var(--success)",color:"var(--on-accent)",padding:"10px 20px",
      borderRadius:20,fontSize:13,fontWeight:600,zIndex:100,
      boxShadow:"0 4px 16px rgba(43,36,23,0.2)",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:8}}>
      {msg}
    </div>
  );
}

function PokemonCard({pokemon, rank, isWinner, onAddToRoster, inRoster, onRemoveFromRoster, onEdit, collapsible, role, defaultOpen}) {
  const helpsPerHour  = Math.round(3600 / freqToSecs(pokemon.frequency) * 10) / 10;
  const subskillScore = scoreSubskills(pokemon.subskills);
  const rankLabels = ["#1 RECOMMENDED","#2","#3","#4","#5"];
  const nat = GAME?.natures?.[pokemon.nature] || {};
  const [open, setOpen] = useState(!collapsible || !!defaultOpen);

  return (
    <div style={{
      background:isWinner?"var(--accent-soft)":"var(--surface)",
      border:`${isWinner?2:1}px solid ${isWinner?"var(--accent)":"var(--border)"}`,
      borderRadius:"var(--radius-card)",padding:collapsible && !open ? "12px 16px" : 20,
      position:"relative",marginBottom:collapsible ? 10 : 20}}>

      {rank !== undefined && (
        <div style={{position:"absolute",top:-10,left:16,
          background:rank===0?"var(--accent)":"var(--text-muted)",color:"var(--on-accent)",
          fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>
          {rankLabels[rank]||`#${rank+1}`}
        </div>
      )}
      {role && (
        <div style={{position:"absolute",top:-10,right:16,zIndex:5,
          background:"var(--surface)",border:"1px solid var(--border-strong)",
          fontSize:10,fontWeight:600,padding:"3px 10px",borderRadius:20,
          color:"var(--text-primary)",fontFamily:"monospace",display:"flex",alignItems:"center",gap:4}}>
          <Icon name={ROLE_ICONS[role]||"star"} size={11}/> {role}
        </div>
      )}

      <div onClick={collapsible ? ()=>setOpen(o=>!o) : undefined}
        style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
        marginTop:rank!==undefined||role?8:0,marginBottom:open?16:0,
        cursor:collapsible?"pointer":"default",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
          <PokemonSprite species={pokemon.species} size={collapsible && !open ? 36 : 44}/>
          <div style={{minWidth:0}}>
            <div style={{fontSize:collapsible && !open ? 15 : 20,fontWeight:600,color:"var(--text-primary)",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pokemon.name}</div>
            <div style={{fontSize:12,color:"var(--text-secondary)",fontFamily:"monospace"}}>
              {pokemon.species} · Lv.{pokemon.level} ·{" "}
              <span style={{color:SPECIALTY_COLOR[pokemon.specialty]||"inherit"}}>{pokemon.specialty}</span>
            </div>
            {open && pokemon.berry && (
              <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"var(--text-muted)",fontFamily:"monospace",marginTop:2}}>
                <Icon name="cherry" size={11}/> {pokemon.berry} · {pokemon.mainSkill} {pokemon.mainSkillLevel ? `Lv.${pokemon.mainSkillLevel}` : ""}
              </div>
            )}
          </div>
        </div>
        <div style={{textAlign:"right",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div>
            <div style={{fontSize:collapsible && !open ? 15 : 20,fontWeight:600,color:"var(--accent)",fontFamily:"monospace"}}>
              {(pokemon.rp||0).toLocaleString()}
            </div>
            <div style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace"}}>RP</div>
          </div>
          {collapsible && (
            <Icon name={open?"chevron-up":"chevron-down"} size={16} style={{color:"var(--text-muted)"}}/>
          )}
        </div>
      </div>

      {open && (
      <React.Fragment>
      <div style={{background:"var(--surface-alt)",borderRadius:10,padding:12,marginBottom:14}}>
        <RadarBar label="HELPS/HR"       value={helpsPerHour}       max={2.5} color="var(--success)"/>
        <RadarBar label="SUBSKILL SCORE" value={subskillScore}      max={12}  color="var(--info)"/>
        <RadarBar label="MAIN SKILL PWR" value={scoreMainSkill(pokemon)} max={7} color="var(--tier-s)"/>
        <RadarBar label="CARRY LIMIT"    value={pokemon.carryLimit||0} max={25} color="var(--text-secondary)"/>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"6px 10px",
        background:"var(--surface-alt)",borderRadius:8,flexWrap:"wrap"}}>
        <span style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace"}}>NATURE</span>
        <span style={{fontSize:12,color:"var(--text-primary)"}}>{pokemon.nature}</span>
        {nat.buff && (
          <span style={{display:"flex",alignItems:"center",gap:2,fontSize:10,color:"var(--success)",marginLeft:"auto"}}>
            <Icon name="arrow-up" size={11}/> {nat.buff}
          </span>
        )}
        {nat.nerf && (
          <span style={{display:"flex",alignItems:"center",gap:2,fontSize:10,color:"var(--danger)"}}>
            <Icon name="arrow-down" size={11}/> {nat.nerf}
          </span>
        )}
        {!nat.buff && !nat.nerf && <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:"auto"}}>neutral</span>}
      </div>

      <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,
        padding:"6px 10px",background:"var(--surface-alt)",borderRadius:8}}>
        <span style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace"}}>FREQUENCY</span>
        <span style={{fontSize:12,color:"var(--accent)",fontFamily:"monospace"}}>{pokemon.frequency}</span>
      </div>

      <div style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace",marginBottom:8,
        letterSpacing:"0.08em"}}>SUBSKILLS</div>
      {SLOT_LEVELS.map(lv => {
        const entry = pokemon.subskills?.[lv];
        return entry?.name
          ? <SubskillBadge key={lv} name={entry.name} locked={entry.locked} level={lv}/>
          : null;
      })}

      <div style={{display:"flex",gap:8,marginTop:14}}>
        {onAddToRoster && !inRoster && (
          <button onClick={()=>onAddToRoster(pokemon)}
            style={{flex:1,padding:"10px",background:"var(--success-bg)",
              border:"1px solid var(--success)",borderRadius:10,color:"var(--success)",
              fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icon name="plus" size={14}/> ADD TO ROSTER
          </button>
        )}
        {onAddToRoster && inRoster && (
          <div style={{flex:1,padding:"10px",textAlign:"center",
            background:"var(--success-bg)",border:"1px solid var(--border)",
            borderRadius:10,color:"var(--success)",fontSize:12,fontWeight:600,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icon name="check" size={14}/> IN YOUR ROSTER
          </div>
        )}
        {onEdit && (
          <button onClick={()=>onEdit(pokemon)}
            style={{flex:1,padding:"10px",background:"var(--info-bg)",
              border:"1px solid var(--info)",borderRadius:10,color:"var(--info)",
              fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icon name="edit" size={14}/> EDIT
          </button>
        )}
        {onRemoveFromRoster && (
          <button onClick={()=>onRemoveFromRoster(pokemon.id)}
            style={{flex:1,padding:"10px",background:"var(--danger-bg)",
              border:"1px solid var(--danger)",borderRadius:10,color:"var(--danger)",
              fontSize:12,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            <Icon name="trash" size={14}/> REMOVE
          </button>
        )}
      </div>
      </React.Fragment>
      )}
    </div>
  );
}

// ── Species Autocomplete ──────────────────────────────────────────────────────
function SpeciesInput({value, onSelect}) {
  const [text, setText] = useState(value || "");
  const [open, setOpen] = useState(false);
  useEffect(() => setText(value || ""), [value]);

  const matches = text.length >= 1 && GAME
    ? Object.keys(GAME.species).filter(s => s.toLowerCase().startsWith(text.toLowerCase())).slice(0, 8)
    : [];

  return (
    <div style={{position:"relative"}}>
      <div style={{position:"relative"}}>
        <Icon name="search" size={16} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--text-muted)"}}/>
        <input value={text} placeholder="e.g. Latios" style={{paddingLeft:36}}
          onChange={e => { setText(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)}/>
      </div>
      {open && matches.length > 0 && (
        <div className="autocomplete-list">
          {matches.map(s => (
            <div key={s} className="autocomplete-item"
              onClick={() => { onSelect(s); setText(s); setOpen(false); }}>
              <span style={{fontWeight:600}}>{s}</span>
              <span style={{fontSize:10,color:"var(--text-secondary)",marginLeft:8,fontFamily:"monospace"}}>
                {GAME.species[s].specialty} · {GAME.species[s].berry}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Data Entry Form ───────────────────────────────────────────────────────────
const EMPTY_FORM = {
  species: "", name: "", level: "", rp: "", freqMins: "", freqSecs: "",
  carryLimit: "", nature: "", mainSkill: "", mainSkillLevel: "1",
  sub10: "", sub25: "", sub50: "", sub70: "", sub80: ""
};

function AddView({onSave, onCompareAdd, editTarget, onDoneEdit}) {
  const [form, setForm] = useState(EMPTY_FORM);
  const [toast, setToast] = useState("");
  const isEdit = !!editTarget;

  useEffect(() => {
    if (editTarget) {
      const fs = freqToSecs(editTarget.frequency);
      setForm({
        species: editTarget.species || "",
        name: editTarget.name || "",
        level: String(editTarget.level || ""),
        rp: String(editTarget.rp || ""),
        freqMins: String(Math.floor(fs / 60)),
        freqSecs: String(fs % 60),
        carryLimit: String(editTarget.carryLimit || ""),
        nature: editTarget.nature || "",
        mainSkill: editTarget.mainSkill || "",
        mainSkillLevel: String(editTarget.mainSkillLevel || "1"),
        sub10: editTarget.subskills?.[10]?.name || "",
        sub25: editTarget.subskills?.[25]?.name || "",
        sub50: editTarget.subskills?.[50]?.name || "",
        sub70: editTarget.subskills?.[70]?.name || "",
        sub80: editTarget.subskills?.[80]?.name || "",
      });
    }
  }, [editTarget]);

  function set(k, v) { setForm(prev => ({...prev, [k]: v})); }
  function showToast(m) { setToast(m); setTimeout(()=>setToast(""), 2200); }

  const speciesData = GAME?.species?.[form.species];
  const natureData  = GAME?.natures?.[form.nature];
  const level = parseInt(form.level) || 0;
  const subskillNames = GAME ? Object.keys(GAME.subskills) : [];

  const chosen = [form.sub10, form.sub25, form.sub50, form.sub70, form.sub80].filter(Boolean);

  function buildPokemon() {
    const subskills = {};
    [["sub10",10],["sub25",25],["sub50",50],["sub70",70],["sub80",80]].forEach(([k, lv]) => {
      if (form[k]) subskills[lv] = { name: form[k], locked: level < lv };
    });
    return {
      id: editTarget?.id || makeId(form.name || form.species),
      name: form.name || form.species,
      species: form.species,
      specialty: speciesData?.specialty || "?",
      berry: speciesData?.berry || "?",
      mainSkill: form.mainSkill || speciesData?.mainSkill || "?",
      mainSkillLevel: parseInt(form.mainSkillLevel) || 1,
      level,
      rp: parseInt(form.rp) || 0,
      frequency: `${parseInt(form.freqMins)||0} mins ${parseInt(form.freqSecs)||0} secs`,
      carryLimit: parseInt(form.carryLimit) || 0,
      nature: form.nature,
      subskills
    };
  }

  const valid = form.species && form.level && form.nature && form.sub10 && form.sub25;

  function handleSave() {
    if (!valid) return;
    onSave(buildPokemon());
    if (isEdit) { onDoneEdit(); showToast("✓ Pokémon updated"); }
    else { setForm(EMPTY_FORM); showToast("✓ Saved to roster"); }
  }

  function handleAddCompare() {
    if (!valid) return;
    onCompareAdd(buildPokemon());
    setForm(EMPTY_FORM);
    showToast("✓ Added to comparison");
  }

  function SubSelect({slotKey, slotLevel}) {
    const locked = level > 0 && level < slotLevel;
    return (
      <div className="field" style={{flex:1,minWidth:"46%"}}>
        <label style={{display:"flex",alignItems:"center",gap:4}}>Lv.{slotLevel} {locked && <Icon name="lock" size={10}/>}</label>
        <select value={form[slotKey]} onChange={e=>set(slotKey, e.target.value)}
          style={{opacity: locked ? 0.6 : 1, fontSize:12, padding:"9px 8px"}}>
          <option value="">— empty —</option>

// ── Team Builder ──────────────────────────────────────────────────────────────
const DISH_TYPE_TO_KEY = { "Curries & Stews": "curry", "Salads": "salad", "Desserts & Drinks": "dessert" };

function speciesIngredientPool(speciesName) {
  const sp = GAME.species[speciesName];
  if (!sp) return new Set();
  const all = [...sp.ingredient0, ...sp.ingredient30, ...sp.ingredient60];
  return new Set(all.map(i => i.ingredient));
}

// Greengrass Isle (Expert Mode): berries aren't fixed - each week has 1 main favorite +
// 2 sub favorites drawn from all 18 berries, plus one random bonus. Formulas below are
// taken directly from Neroli's Lab's own expert-mode event/simulation source, not guessed.
const EXPERT_BONUS_LABELS = { ingredient: "Ingredients", berry: "Berries", skill: "Skills" };

function expertBerryTier(p, expertSettings) {
  if (!expertSettings) return "none";
  if (p.berry === expertSettings.mainBerry) return "main";
  if (expertSettings.subBerries.includes(p.berry)) return "sub";
  return "none";
}

function buildTeam(roster, islandName, recipeName, expertSettings) {
  const island = GAME.islands[islandName];
  const acceptsAll = island.berries.includes("all");
  const berryMatch = p => acceptsAll || island.berries.includes(p.berry);

  const recipe = recipeName ? GAME.recipes.find(r => r.name === recipeName) : null;
  const requiredIngredients = recipe ? new Set(recipe.ingredients.map(i => i.ingredient)) : null;
  const ingredientMatch = p => requiredIngredients &&
    [...speciesIngredientPool(p.species)].some(ing => requiredIngredients.has(ing));

  const isExpert = island.expert && expertSettings;

  // Score with island + recipe context: berry match and needed-ingredient match are bonuses
  function teamScore(p) {
    let s = totalScore(p);
    if (isExpert) {
      const tier = expertBerryTier(p, expertSettings);
      // Frequency multiplier (main 0.9x / sub 1.0x / none 1.15x) applied as an equivalent
      // helps/hour adjustment, on top of the base totalScore's own frequency term.
      const freqMult = tier === "main" ? 1/0.9 : tier === "sub" ? 1 : 1/1.15;
      s += (3600 / freqToSecs(p.frequency)) * (freqMult - 1);
      if (tier === "main") s += 2; // skill level +1 (capped) nudges main-skill power up
      if (tier !== "none" && expertSettings.randomBonus === p.specialty.toLowerCase().replace(/s$/, "")) {
        s += 6; // this week's bonus specialty rewards favored-berry members of that specialty
      }
    } else if (berryMatch(p)) {
      s += p.specialty === "Berries" ? 8 : 3;
    }
    if (ingredientMatch(p)) s += p.specialty === "Ingredients" ? 6 : 2;
    return s;
  }

  const pool = [...roster].sort((a,b) => teamScore(b) - teamScore(a));
  const team = [];
  const used = new Set();

  function pick(filterFn, role) {
    const found = pool.find(p => !used.has(p.id) && filterFn(p));
    if (found) { used.add(found.id); team.push({...found, role}); return true; }
    return false;
  }

  // Slot 1: best Ingredient specialist that actually supplies the recipe (if one is chosen)
  if (requiredIngredients) {
    pick(p => p.specialty === "Ingredients" && ingredientMatch(p), "Ingredients (dish)");
  }
  // Slot 2: best Ingredient specialist overall (dish support)
  pick(p => p.specialty === "Ingredients", "Ingredients");
  // Slot 3: best Skill specialist (utility/energy)
  pick(p => p.specialty === "Skills", "Skills / Utility");
  // Slot 4: best berry-matching Berry specialist (island synergy / main favorite first)
  if (isExpert) {
    pick(p => p.specialty === "Berries" && expertBerryTier(p, expertSettings) === "main", "Berries (main favorite)");
    pick(p => p.specialty === "Berries" && expertBerryTier(p, expertSettings) === "sub", "Berries (sub favorite)");
  } else {
    pick(p => p.specialty === "Berries" && berryMatch(p), "Berries (island)");
  }
  // Slots 5+: best remaining by score
  while (team.length < 5) {
    if (!pick(() => true, "Best available")) break;
  }

  // Analysis
  const specialties = team.reduce((acc,p) => { acc[p.specialty]=(acc[p.specialty]||0)+1; return acc; }, {});
  const warnings = [];
  if (!specialties["Ingredients"]) warnings.push("No ingredient specialist — cooking may fall short");
  if (!specialties["Skills"]) warnings.push("No skill specialist — less main skill utility");
  if (roster.length < 5) warnings.push(`You only have ${roster.length} Pokémon in the roster`);

  let matches, mainMatches, subMatches;
  if (isExpert) {
    mainMatches = team.filter(p => expertBerryTier(p, expertSettings) === "main").length;
    subMatches = team.filter(p => expertBerryTier(p, expertSettings) === "sub").length;
    matches = mainMatches + subMatches;
    if (mainMatches === 0) warnings.push("No team member has this week's main favorite berry — missing the frequency and skill-level bonus");
    const bonusKey = expertSettings.randomBonus;
    const bonusSpecialty = bonusKey === "ingredient" ? "Ingredients" : bonusKey === "berry" ? "Berries" : "Skills";
    const hasBonusSynergy = team.some(p => p.specialty === bonusSpecialty && expertBerryTier(p, expertSettings) !== "none");
    if (!hasBonusSynergy) warnings.push(`This week's ${EXPERT_BONUS_LABELS[bonusKey]} bonus needs a favored-berry ${bonusSpecialty} specialist to pay off - none made the team`);
  } else {
    matches = team.filter(berryMatch).length;
    if (matches < 2) warnings.push("Few Pokémon matching the island berries — low Drowsy Power");
  }

  let missingIngredients = [];
  if (requiredIngredients) {
    const covered = new Set();
    team.forEach(p => speciesIngredientPool(p.species).forEach(ing => { if (requiredIngredients.has(ing)) covered.add(ing); }));
    missingIngredients = [...requiredIngredients].filter(ing => !covered.has(ing));
    if (missingIngredients.length > 0) {
      warnings.push(`No team member produces: ${missingIngredients.join(", ")}`);
    }
  }

  return { team, specialties, matches, mainMatches, subMatches, isExpert, expertSettings, warnings, recipe, missingIngredients };
}

              <select value={expert.subBerry2} onChange={e=>{setExpert(prev=>({...prev, subBerry2: e.target.value})); setResult(null);}}>
                <option value="">— select —</option>
                {GAME.berries.map(b => (
                  <option key={b.name} value={b.name} disabled={b.name === expert.mainBerry || b.name === expert.subBerry1}>{b.name}</option>
                ))}
              </select>
            </div>
          </div>
          <div className="field" style={{marginBottom:0}}>
            <label>Random bonus this week *</label>
            <select value={expert.randomBonus} onChange={e=>{setExpert(prev=>({...prev, randomBonus: e.target.value})); setResult(null);}}>
              <option value="ingredient">Ingredients — extra ingredients from favored berries</option>
              <option value="berry">Berries — favored-berry strength boosted</option>
              <option value="skill">Skills — favored-berry skill chance boosted</option>
            </select>
          </div>
          <div style={{marginTop:10,fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace",lineHeight:1.6}}>
            Main favorite: 10% faster help + skill level +1. Sub favorites: normal speed. Neither: 15% slower.
          </div>
        </div>
      )}

      <div className="field">
        <label>Snorlax dish (optional)</label>
        <select value={recipeName} onChange={e=>{setRecipeName(e.target.value); setResult(null);}}>
          <option value="">— no specific dish —</option>
          {Object.entries(DISH_TYPE_TO_KEY).map(([label, key]) => (
            <optgroup key={key} label={label}>
              {GAME.recipes.filter(r => r.type === key).sort((a,b)=>b.value-a.value).map(r => (
                <option key={r.name} value={r.name}>{r.name}</option>
              ))}
            </optgroup>
          ))}
        </select>
        {recipe && (
          <div style={{marginTop:6,padding:"8px 10px",background:"var(--tier-s-bg)",
            border:"1px solid var(--tier-s)",borderRadius:8,fontSize:11,
            color:"var(--tier-s)",fontFamily:"monospace",display:"flex",alignItems:"center",gap:5}}>
            <Icon name="soup" size={12}/> Needs: {recipe.ingredients.map(i => `${i.ingredient} x${i.amount}`).join(", ")}
          </div>
        )}
      </div>

      <button onClick={()=>setResult(buildTeam(roster, island, recipeName,
          isExpertIsland ? { mainBerry: expert.mainBerry, subBerries: [expert.subBerry1, expert.subBerry2], randomBonus: expert.randomBonus } : null))}
        disabled={!island || !expertReady}
        style={{width:"100%",padding:14,border:"none",borderRadius:"var(--radius-control)",fontSize:14,fontWeight:600,
          letterSpacing:"0.05em",marginBottom:20,
          background:(island && expertReady)?"var(--accent)":"var(--surface-alt)",
          color:(island && expertReady)?"var(--on-accent)":"var(--text-muted)",
          display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <Icon name="hammer" size={16}/> BUILD OPTIMAL TEAM
      </button>

      {result && (
        <div>
          {/* Summary */}
          <div style={{background:"var(--surface-alt)",border:"1px solid var(--border)",
            borderRadius:"var(--radius-control)",padding:"14px 16px",marginBottom:16}}>
            <div style={{fontSize:11,color:"var(--text-secondary)",fontFamily:"monospace",marginBottom:6}}>TEAM BALANCE</div>
            <div style={{display:"flex",gap:14,flexWrap:"wrap",fontSize:12,fontFamily:"monospace"}}>
              <span style={{display:"flex",alignItems:"center",gap:4,color:"var(--danger)"}}><Icon name="cherry" size={13}/> {result.specialties["Berries"]||0} Berries</span>
              <span style={{display:"flex",alignItems:"center",gap:4,color:"var(--success)"}}><Icon name="soup" size={13}/> {result.specialties["Ingredients"]||0} Ingredients</span>
              <span style={{display:"flex",alignItems:"center",gap:4,color:"var(--info)"}}><Icon name="bolt" size={13}/> {result.specialties["Skills"]||0} Skills</span>
              {result.isExpert ? (
                <span style={{display:"flex",alignItems:"center",gap:4,color:"var(--text-secondary)"}}>
                  <Icon name="beach" size={13}/> {result.mainMatches} main / {result.subMatches} sub favorite
                </span>
              ) : (
                <span style={{display:"flex",alignItems:"center",gap:4,color:"var(--text-secondary)"}}><Icon name="beach" size={13}/> {result.matches}/5 berry match</span>
              )}
            </div>
            {result.isExpert && (
              <div style={{marginTop:8,fontSize:11,color:"var(--text-secondary)",fontFamily:"monospace"}}>
                This week's bonus: <span style={{color:"var(--accent)"}}>{EXPERT_BONUS_LABELS[result.expertSettings.randomBonus]}</span>
              </div>
            )}
          </div>

          {/* Warnings */}
          {result.warnings.length > 0 && (
            <div style={{background:"var(--tier-s-bg)",border:"1px solid var(--tier-s)",
              borderRadius:"var(--radius-control)",padding:"12px 14px",marginBottom:16}}>
              {result.warnings.map((w,i) => (
                <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,fontSize:11,color:"var(--tier-s)",lineHeight:1.7,fontFamily:"monospace"}}>
                  <Icon name="alert-triangle" size={13} style={{marginTop:2,flexShrink:0}}/> {w}
                </div>
              ))}
            </div>
          )}

          {/* Team members - collapsed so all 5 fit on one screen; tap to expand details */}
          <div style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace",marginBottom:8,
            letterSpacing:"0.05em"}}>YOUR TEAM · TAP TO SEE DETAILS</div>
          {result.team.map((p,i) => (
            <div key={p.id} style={{position:"relative"}}>
              <PokemonCard pokemon={p} role={p.role} collapsible/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [gameLoaded, setGameLoaded] = useState(false);
  const [gameError, setGameError]   = useState(false);
  const [, forceRerender]           = useState(0);
  const [view, setView]             = useState(VIEWS.ADD);
  const [compared, setCompared]     = useState([]);
  const [editTarget, setEditTarget] = useState(null);
  const [toast, setToast]           = useState("");
  const [theme, setTheme]           = useState(() => {
    const saved = localStorage.getItem("pks_theme");
    if (saved) return saved;
    return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  });
  const [roster, setRoster]         = useState(() => {
    try { return JSON.parse(localStorage.getItem("pks_roster_v2") || "[]"); }
    catch { return []; }
  });

  // Load game data
  useEffect(() => {
    fetch("./gameData.json")
      .then(r => r.json())
      .then(data => { GAME = data; setGameLoaded(true); })
      .catch(() => setGameError(true));
    fetch("./species-sprite-ids.json")
      .then(r => r.json())
      .then(data => { SPRITE_IDS = data; forceRerender(v => v+1); })
      .catch(() => { SPRITE_IDS = {}; });
  }, []);

  // Register service worker
  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(e => console.log("SW error:", e));
    }
  }, []);

  useEffect(() => {
    localStorage.setItem("pks_roster_v2", JSON.stringify(roster));
  }, [roster]);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("pks_theme", theme);
    const meta = document.getElementById("theme-color-meta");
    if (meta) meta.setAttribute("content", theme === "dark" ? "#10180C" : "#F1F8E9");
  }, [theme]);

  function showToast(m) { setToast(m); setTimeout(()=>setToast(""), 2200); }

  function saveToRoster(pokemon) {
    setRoster(prev => {
      const idx = prev.findIndex(p => p.id === pokemon.id);
      if (idx >= 0) {
        const copy = [...prev]; copy[idx] = pokemon; return copy;
      }
      return [...prev, pokemon];
    });
  }

  function removeFromRoster(id) {
    setRoster(prev => prev.filter(p => p.id !== id));
  }

  function addToCompare(pokemon) {
    setCompared(prev => [...prev, pokemon]);
  }

  function startEdit(pokemon) {
    setEditTarget(pokemon);
    setView(VIEWS.ADD);
  }

  function exportRoster() {
    const blob = new Blob([JSON.stringify(roster, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `pks-roster-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importRoster(text) {
    try {
      const arr = JSON.parse(text);
      if (!Array.isArray(arr)) throw new Error();
      setRoster(prev => {
        const ids = new Set(prev.map(p => p.id));
        const news = arr.filter(p => !ids.has(p.id));
        return [...prev, ...news];
      });
      showToast(`✓ Roster imported`);
    } catch {
      showToast("⚠ Invalid file");
    }
  }

  const rosterIds = new Set(roster.map(p => p.id));

  const NAV = [
    { id: VIEWS.ADD,     label: "Add",      icon: "plus" },
    { id: VIEWS.COMPARE, label: "Compare",  icon: "swords" },
    { id: VIEWS.ROSTER,  label: "Roster",   icon: "clipboard-list" },
    { id: VIEWS.TEAM,    label: "Team",     icon: "beach" },
  ];

  if (gameError) return (
    <div style={{padding:40,textAlign:"center"}}>
      <Icon name="alert-triangle" size={40} style={{color:"var(--danger)",marginBottom:16}}/>
      <div style={{fontSize:16,fontWeight:600}}>Error loading game data</div>
      <div style={{fontSize:13,color:"var(--text-secondary)",marginTop:8}}>Make sure gameData.json is in the same folder</div>
    </div>
  );

  if (!gameLoaded) return (
    <div style={{padding:60,textAlign:"center"}}>
      <Icon name="moon-stars" size={40} style={{color:"var(--accent)",marginBottom:16}}/>
      <div style={{fontSize:14,color:"var(--text-secondary)",fontFamily:"monospace"}}>Loading game data...</div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",paddingBottom:70}}>

      {toast && <Toast msg={toast}/>}

      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",
        padding:"14px 16px",position:"sticky",top:0,zIndex:10,
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,fontSize:17,fontWeight:600,color:"var(--text-primary)"}}>
            <Icon name="moon-stars" size={18} style={{color:"var(--accent)"}}/> SLEEP OPTIMIZER
          </div>
          <div style={{fontSize:10,color:"var(--text-secondary)",fontFamily:"monospace",letterSpacing:"0.1em"}}>
            PWA · OFFLINE READY · v{GAME.meta.version}
          </div>
        </div>
        <button onClick={()=>setTheme(t => t === "dark" ? "light" : "dark")}
          aria-label={theme === "dark" ? "Switch to light theme" : "Switch to dark theme"}
          style={{background:"var(--surface-alt)",border:"1px solid var(--border)",borderRadius:"50%",
            width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <Icon name={theme === "dark" ? "sun" : "moon-stars"} size={17} style={{color:"var(--text-secondary)"}}/>
        </button>
      </div>

      <div style={{padding:"20px 16px",maxWidth:480,margin:"0 auto"}}>
        {view === VIEWS.ADD && (
          <AddView
            onSave={p => { saveToRoster(p); }}
            onCompareAdd={addToCompare}
            editTarget={editTarget}
            onDoneEdit={() => { setEditTarget(null); setView(VIEWS.ROSTER); }}/>
        )}
        {view === VIEWS.COMPARE && (
          <CompareView compared={compared} onAddToRoster={p => { saveToRoster(p); }}
            rosterIds={rosterIds} onClear={()=>setCompared([])}
            onGoAdd={()=>setView(VIEWS.ADD)}/>
        )}
        {view === VIEWS.ROSTER && (
          <RosterView roster={roster} onRemove={removeFromRoster} onEdit={startEdit}
            onGoAdd={()=>setView(VIEWS.ADD)} onExport={exportRoster} onImport={importRoster}/>
        )}
        {view === VIEWS.TEAM && (
          <TeamView roster={roster} onGoAdd={()=>setView(VIEWS.ADD)}/>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"var(--surface)",
        borderTop:"1px solid var(--border)",display:"flex",zIndex:10}}>
        {NAV.map(n => (
          <button key={n.id} onClick={()=>{ setView(n.id); if (n.id !== VIEWS.ADD) setEditTarget(null); }}
            style={{flex:1,padding:"12px 8px",background:"transparent",border:"none",
              color:view===n.id?"var(--accent)":"var(--text-muted)",
              borderTop:view===n.id?"2px solid var(--accent)":"2px solid transparent",
              display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <Icon name={n.icon} size={19}/>
            <span style={{fontSize:10,fontWeight:600,letterSpacing:"0.05em"}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
